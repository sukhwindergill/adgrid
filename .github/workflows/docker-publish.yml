name: Build and publish screen-agent images

on:
  push:
    branches: [main]
    paths:
      - "screen-agent/**"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  ORG: adgrid

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: camera
            context: screen-agent/camera
          - name: inference
            context: screen-agent/inference
          - name: pusher
            context: screen-agent/pusher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/screen-agent-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/screen-agent-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
